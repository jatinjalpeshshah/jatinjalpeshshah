<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" width="100%" height="100%">
  <defs>
    <!-- Background Patterns -->
    <pattern id="dot-grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="rgba(59, 130, 246, 0.15)"/>
    </pattern>
    <pattern id="hex-grid" width="52" height="60" patternUnits="userSpaceOnUse">
      <path d="M 26 0 L 52 15 L 52 45 L 26 60 L 0 45 L 0 15 Z" fill="none" stroke="rgba(59, 130, 246, 0.04)" stroke-width="1"/>
    </pattern>
    
    <!-- Gradients -->
    <radialGradient id="radar-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(16, 185, 129, 0.05)" />
      <stop offset="100%" stop-color="rgba(10, 14, 18, 0)" />
    </radialGradient>
    <radialGradient id="panel-glow" cx="0%" cy="0%" r="100%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.04)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0)" />
    </radialGradient>
    <linearGradient id="scan" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(59, 130, 246, 0)" />
      <stop offset="50%" stop-color="rgba(59, 130, 246, 0.15)" />
      <stop offset="100%" stop-color="rgba(59, 130, 246, 0)" />
    </linearGradient>

    <!-- Filters for soft shadow -->
    <filter id="drop-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>

    <style>
      .bg { fill: #080C11; }
      
      /* Typography */
      .font-sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
      .font-mono { font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace; }
      
      .text-platform { font-size: 10px; font-weight: 700; fill: #38BDF8; letter-spacing: 2px; }
      .text-operator { font-size: 11px; font-weight: 600; fill: #64748B; letter-spacing: 1px; text-transform: uppercase; }
      .text-name { font-size: 34px; font-weight: 800; fill: #F8FAFC; letter-spacing: 1px; }
      .text-title { font-size: 14px; font-weight: 600; fill: #94A3B8; letter-spacing: 2px; }
      .text-mission { font-size: 13px; font-weight: 400; fill: #64748B; letter-spacing: 0.5px; line-height: 1.6; }
      
      .text-metric-label { font-size: 10px; font-weight: 600; fill: #64748B; letter-spacing: 1px; text-transform: uppercase; }
      .text-metric-value { font-size: 16px; font-weight: 700; fill: #F8FAFC; }
      .text-metric-value-sm { font-size: 13px; font-weight: 600; fill: #F8FAFC; }
      
      .text-telemetry-label { font-size: 11px; fill: #64748B; letter-spacing: 0.5px; }
      .text-telemetry-val { font-size: 11px; font-weight: 600; fill: #E2E8F0; }
      
      .text-cat { font-size: 10px; font-weight: 700; fill: #38BDF8; letter-spacing: 1.5px; text-transform: uppercase; }
      .text-chip { font-size: 11px; font-weight: 600; fill: #94A3B8; }
      
      /* Status Colors */
      .status-green { fill: #10B981; }
      .status-blue { fill: #38BDF8; }
      .status-amber { fill: #F59E0B; }
      
      /* Shapes */
      .glass-panel { fill: url(#panel-glow); stroke: rgba(59, 130, 246, 0.15); stroke-width: 1; rx: 4; }
      .chip-bg { fill: rgba(15, 23, 42, 0.6); stroke: rgba(59, 130, 246, 0.2); stroke-width: 1; rx: 3; }
      
      /* Animations */
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
      .anim-pulse { animation: pulse 3s ease-in-out infinite; }
      
      @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
      .anim-blink { animation: blink 1.2s step-end infinite; }
      
      @keyframes scan { 0% { transform: translateY(-100%); } 100% { transform: translateY(480px); } }
      .anim-scan { animation: scan 8s linear infinite; }
      
      @keyframes gridDrift { 0% { transform: translate(0, 0); } 100% { transform: translate(-30px, -30px); } }
      .anim-grid { animation: gridDrift 15s linear infinite; }

      @keyframes radarSweep { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      .anim-radar { animation: radarSweep 10s linear infinite; transform-origin: 850px 150px; }
    </style>
  </defs>

  <!-- BACKGROUND -->
  <rect class="bg" width="100%" height="100%" />
  <g class="anim-grid" opacity="0.6">
    <rect width="1200" height="600" fill="url(#dot-grid)" x="-100" y="-100" />
    <rect width="1200" height="600" fill="url(#hex-grid)" x="-100" y="-100" />
  </g>

  <!-- RADAR / AMBIENT GLOW -->
  <circle cx="850" cy="150" r="250" fill="url(#radar-glow)" />
  <path d="M 850 150 L 850 -100 A 250 250 0 0 1 1100 150 Z" fill="rgba(16, 185, 129, 0.03)" class="anim-radar" />
  <circle cx="850" cy="150" r="100" fill="none" stroke="rgba(16, 185, 129, 0.1)" stroke-width="1" stroke-dasharray="4 4" />
  <circle cx="850" cy="150" r="200" fill="none" stroke="rgba(16, 185, 129, 0.05)" stroke-width="1" />
  
  <!-- SCANLINE -->
  <rect width="100%" height="100%" fill="url(#scan)" class="anim-scan" />

  <!-- ================= LEFT COLUMN (IDENTITY) ================= -->
  <g transform="translate(50, 50)" class="font-sans">
    
    <!-- Platform Header -->
    <text x="0" y="0" class="text-platform">SECURITY OPERATIONS PLATFORM</text>
    <rect x="0" y="8" width="40" height="2" fill="#38BDF8" />
    
    <g transform="translate(0, 35)">
      <!-- Operator -->
      <text x="0" y="0" class="text-operator font-mono">AUTHENTICATED OPERATOR</text>
      <!-- Name -->
      <text x="0" y="32" class="text-name">JATIN JALPESH SHAH</text>
      <!-- Titles -->
      <text x="0" y="60" class="text-title">CYBERSECURITY ENGINEER <tspan fill="#334155">|</tspan> AI SECURITY RESEARCHER</text>
      
      <!-- Mission -->
      <text x="0" y="95" class="text-mission">
        <tspan x="0" dy="0">Building intelligent security platforms focused on threat</tspan>
        <tspan x="0" dy="22">detection, network visibility and AI-driven defense.</tspan>
      </text>
    </g>

    <!-- Metrics Grid -->
    <g transform="translate(0, 180)">
      <!-- Metric 1: Projects -->
      <g transform="translate(0, 0)">
        <rect width="140" height="60" class="glass-panel" filter="url(#drop-shadow)" />
        <rect x="0" y="0" width="3" height="60" fill="#38BDF8" rx="1.5" />
        <text x="15" y="22" class="text-metric-label">PROJECTS</text>
        <text x="15" y="45" class="text-metric-value font-mono">04</text>
      </g>
      
      <!-- Metric 2: Research -->
      <g transform="translate(155, 0)">
        <rect width="140" height="60" class="glass-panel" filter="url(#drop-shadow)" />
        <rect x="0" y="0" width="3" height="60" fill="#10B981" rx="1.5" />
        <text x="15" y="22" class="text-metric-label">RESEARCH</text>
        <text x="15" y="45" class="text-metric-value font-mono">01</text>
      </g>

      <!-- Metric 3: Focus -->
      <g transform="translate(310, 0)">
        <rect width="160" height="60" class="glass-panel" filter="url(#drop-shadow)" />
        <rect x="0" y="0" width="3" height="60" fill="#8B5CF6" rx="1.5" />
        <text x="15" y="22" class="text-metric-label">PRIMARY FOCUS</text>
        <text x="15" y="45" class="text-metric-value-sm">AI Security</text>
      </g>
    </g>
    
    <!-- Second row of metrics -->
    <g transform="translate(0, 255)">
      <!-- Metric 4: Availability -->
      <g transform="translate(0, 0)">
        <rect width="470" height="40" class="glass-panel" filter="url(#drop-shadow)" />
        <circle cx="20" cy="20" r="4" class="status-green anim-pulse" />
        <text x="35" y="16" class="text-metric-label">AVAILABILITY</text>
        <text x="35" y="32" class="text-metric-value-sm">Open to Collaboration</text>
      </g>
    </g>
  </g>

  <!-- ================= RIGHT COLUMN (TELEMETRY DASHBOARD) ================= -->
  <g transform="translate(620, 50)" class="font-mono" filter="url(#drop-shadow)">
    <!-- Main Dashboard Container -->
    <rect width="320" height="245" class="glass-panel" fill="rgba(10, 15, 25, 0.9)" stroke="#1E293B" />
    
    <!-- Corner Micro-Borders -->
    <path d="M 0 10 L 0 0 L 10 0" fill="none" stroke="#38BDF8" stroke-width="2" />
    <path d="M 310 0 L 320 0 L 320 10" fill="none" stroke="#38BDF8" stroke-width="2" />
    <path d="M 0 235 L 0 245 L 10 245" fill="none" stroke="#38BDF8" stroke-width="2" />
    <path d="M 310 245 L 320 245 L 320 235" fill="none" stroke="#38BDF8" stroke-width="2" />
    
    <!-- Dashboard Header -->
    <rect x="15" y="15" width="290" height="25" fill="rgba(59, 130, 246, 0.1)" rx="2" />
    <text x="25" y="32" font-size="11px" font-weight="bold" fill="#38BDF8" letter-spacing="1px">SYSTEM TELEMETRY</text>
    <text x="290" y="32" font-size="11px" fill="#10B981" text-anchor="end" class="anim-blink">● LIVE</text>
    
    <!-- Telemetry Data Rows -->
    <g transform="translate(25, 65)">
      <!-- Operator -->
      <text x="0" y="0" class="text-telemetry-label">Operator</text>
      <text x="270" y="0" class="text-telemetry-val" text-anchor="end">Jatin Jalpesh Shah</text>
      <line x1="0" y1="8" x2="270" y2="8" stroke="#1E293B" stroke-width="1" stroke-dasharray="2 2" />
      
      <!-- Threat Feed -->
      <text x="0" y="25" class="text-telemetry-label">Threat Feed</text>
      <text x="270" y="25" class="text-telemetry-val status-green" text-anchor="end">ONLINE</text>
      <line x1="0" y1="33" x2="270" y2="33" stroke="#1E293B" stroke-width="1" stroke-dasharray="2 2" />
      
      <!-- Detection Rules -->
      <text x="0" y="50" class="text-telemetry-label">Detection Rules</text>
      <text x="270" y="50" class="text-telemetry-val" text-anchor="end">147</text>
      <line x1="0" y1="58" x2="270" y2="58" stroke="#1E293B" stroke-width="1" stroke-dasharray="2 2" />
      
      <!-- Security Modules -->
      <text x="0" y="75" class="text-telemetry-label">Security Modules</text>
      <text x="270" y="75" class="text-telemetry-val" text-anchor="end">12</text>
      <line x1="0" y1="83" x2="270" y2="83" stroke="#1E293B" stroke-width="1" stroke-dasharray="2 2" />
      
      <!-- Monitoring -->
      <text x="0" y="100" class="text-telemetry-label">Monitoring</text>
      <text x="270" y="100" class="text-telemetry-val status-blue" text-anchor="end">ACTIVE</text>
      <line x1="0" y1="108" x2="270" y2="108" stroke="#1E293B" stroke-width="1" stroke-dasharray="2 2" />
      
      <!-- Repository Health -->
      <text x="0" y="125" class="text-telemetry-label">Repository Health</text>
      <text x="270" y="125" class="text-telemetry-val status-green" text-anchor="end">STABLE</text>
      <line x1="0" y1="133" x2="270" y2="133" stroke="#1E293B" stroke-width="1" stroke-dasharray="2 2" />
      
      <!-- Research Mode -->
      <text x="0" y="150" class="text-telemetry-label">Research Mode</text>
      <text x="270" y="150" class="text-telemetry-val status-amber" text-anchor="end">ACTIVE</text>
      <line x1="0" y1="158" x2="270" y2="158" stroke="#1E293B" stroke-width="1" stroke-dasharray="2 2" />
    </g>
  </g>

  <!-- ================= BOTTOM (TECH STACK) ================= -->
  <g transform="translate(50, 360)" class="font-sans">
    
    <!-- Category 1: Security -->
    <g transform="translate(0, 0)">
      <text x="0" y="0" class="text-cat">SECURITY</text>
      <rect x="0" y="8" width="130" height="26" class="chip-bg" />
      <text x="65" y="25" class="text-chip" text-anchor="middle">Threat Intelligence</text>
      
      <rect x="138" y="8" width="145" height="26" class="chip-bg" />
      <text x="210.5" y="25" class="text-chip" text-anchor="middle">Detection Engineering</text>
    </g>
    
    <!-- Category 2: AI -->
    <g transform="translate(305, 0)">
      <text x="0" y="0" class="text-cat">AI</text>
      <rect x="0" y="8" width="120" height="26" class="chip-bg" />
      <text x="60" y="25" class="text-chip" text-anchor="middle">Machine Learning</text>
    </g>
    
    <!-- Category 3: Languages -->
    <g transform="translate(445, 0)">
      <text x="0" y="0" class="text-cat">LANGUAGES</text>
      <rect x="0" y="8" width="70" height="26" class="chip-bg" />
      <text x="35" y="25" class="text-chip" text-anchor="middle">Python</text>
      
      <rect x="78" y="8" width="85" height="26" class="chip-bg" />
      <text x="120.5" y="25" class="text-chip" text-anchor="middle">TypeScript</text>
    </g>
    
    <!-- Category 4: Frameworks -->
    <g transform="translate(630, 0)">
      <text x="0" y="0" class="text-cat">FRAMEWORKS</text>
      <rect x="0" y="8" width="70" height="26" class="chip-bg" />
      <text x="35" y="25" class="text-chip" text-anchor="middle">FastAPI</text>
      
      <rect x="78" y="8" width="75" height="26" class="chip-bg" />
      <text x="115.5" y="25" class="text-chip" text-anchor="middle">Electron</text>
      
      <rect x="161" y="8" width="60" height="26" class="chip-bg" />
      <text x="191" y="25" class="text-chip" text-anchor="middle">React</text>
      
      <rect x="229" y="8" width="70" height="26" class="chip-bg" />
      <text x="264" y="25" class="text-chip" text-anchor="middle">Next.js</text>
    </g>
  </g>

  <!-- ================= FOOTER / SIGNATURE ================= -->
  <g transform="translate(50, 440)" class="font-mono">
    <path d="M 0 0 L 900 0" stroke="#1E293B" stroke-width="1" />
    <text x="0" y="20" font-size="10px" fill="#475569" letter-spacing="1px">VANGUARD OS <tspan fill="#38BDF8">|</tspan> BUILD 2026.07 <tspan fill="#38BDF8">|</tspan> SECURE WORKSPACE</text>
    <text x="900" y="20" font-size="10px" fill="#475569" text-anchor="end">SYSTEM UPTIME: <tspan fill="#10B981">99.98%</tspan></text>
  </g>

</svg>
