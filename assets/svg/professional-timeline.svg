  <text x="193" y="223" font-size="7" fill="#64748B">Status:</text>
  <text x="233" y="223" font-size="7" font-weight="600" fill="#10B981">Completed</text>

  <!-- M3: Research Publication -->
  <rect x="326" y="290" width="140" height="95" rx="6" fill="#0F172A" stroke="#1E293B">
    <animate attributeName="stroke" values="#1E293B;#38BDF8;#1E293B" dur="6s" begin="2.4s" repeatCount="indefinite" />
