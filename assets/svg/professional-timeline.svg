<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 540" width="1000" height="540" class="font-sans">
  <defs>
    <style>
      .font-sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
      .a-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
      .grid-move { animation: gridPan 30s linear infinite; }
      @keyframes gridPan { from { transform: translateX(0); } to { transform: translateX(-40px); } }
    </style>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="0.5" opacity="0.4" />
    </pattern>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" />
  <g class="grid-move">
    <rect x="0" y="0" width="1040" height="100%" fill="url(#grid)" />
  </g>

  <!-- Slow Blueprint Scan Line -->
  <line x1="0" y1="0" x2="0" y2="540" stroke="#38BDF8" stroke-width="1.5" opacity="0.15">
    <animateTransform attributeName="transform" type="translate" from="-50 0" to="1050 0" dur="10s" repeatCount="indefinite" />
  </line>

  <!-- Hexagonal Accents -->
  <g fill="none" stroke="#38BDF8" stroke-width="0.5" opacity="0.15">
    <polygon points="50,150 60,140 70,150 70,160 60,170 50,160" />
    <polygon points="900,350 910,340 920,350 920,360 910,370 900,360" />
  </g>

  <!-- Header -->
  <g transform="translate(30, 40)">
    <text x="0" y="0" font-size="10" font-weight="700" fill="#94A3B8" letter-spacing="1">ENGINEERING JOURNEY</text>
    <text x="145" y="0" font-size="10" font-weight="700" fill="#38BDF8">v1.0</text>
    <circle cx="185" cy="-3" r="3" fill="#10B981" class="a-pulse" />
    <text x="193" y="0" font-size="10" font-weight="700" fill="#10B981">ACTIVE</text>
    <text x="250" y="0" font-size="10" fill="#64748B">// Professional Timeline</text>
  </g>

  <!-- Evolution Visual (Top Right) -->
  <rect x="460" y="30" width="510" height="50" rx="6" fill="#020617" stroke="#1E293B" />
  
  <path d="M 530 55 L 545 55 M 610 55 L 625 55 M 675 55 L 690 55 M 770 55 L 785 55 M 885 55 L 900 55" fill="none" stroke="#1E293B" stroke-width="1.5" />
  
  <circle r="1.5" fill="#38BDF8">
    <animateMotion dur="6s" repeatCount="indefinite" path="M475,55 L960,55" />
  </circle>

  <g fill="#0F172A">
    <rect x="475" y="43" width="55" height="24" rx="2" stroke="#1E293B" />
    <rect x="545" y="43" width="65" height="24" rx="2" stroke="#1E293B" />
    <rect x="625" y="43" width="50" height="24" rx="2" stroke="#1E293B" />
    <rect x="690" y="43" width="80" height="24" rx="2" stroke="#1E293B" />
    <rect x="785" y="43" width="100" height="24" rx="2" stroke="#1E293B" />
    <rect x="900" y="43" width="60" height="24" rx="2" stroke="#38BDF8" />
  </g>
  <g font-size="6" font-weight="600" text-anchor="middle">
    <text x="502.5" y="56" fill="#94A3B8">Foundation</text>
    <text x="577.5" y="56" fill="#94A3B8">Full Stack Dev</text>
    <text x="650" y="56" fill="#94A3B8">Research</text>
    <text x="730" y="56" fill="#94A3B8">AI Platforms</text>
    <text x="835" y="56" fill="#94A3B8">Enterprise Eng.</text>
    <text x="930" y="56" fill="#38BDF8">Portfolio</text>
  </g>

  <!-- Main Timeline Roadmap -->
  <path d="M30 260 L970 260" fill="none" stroke="#1E293B" stroke-width="2" />
  <path d="M30 260 L840 260" fill="none" stroke="#38BDF8" stroke-width="2" />
  
  <!-- Active Timeline Signal -->
  <circle r="2.5" fill="#F8FAFC">
    <animateMotion dur="6s" repeatCount="indefinite" path="M30,260 L840,260" />
  </circle>

  <!-- Timeline Connectors -->
  <g fill="none" stroke="#1E293B" stroke-width="1.5" stroke-dasharray="2 2">
    <path d="M100 266 L100 290" />
    <path d="M248 254 L248 230" />
    <path d="M396 266 L396 290" />
    <path d="M544 254 L544 230" />
    <path d="M692 266 L692 290" />
    <path d="M840 254 L840 230" />
  </g>

  <!-- Timeline Nodes -->
  <circle cx="100" cy="260" r="5" fill="#38BDF8" />
  <circle cx="248" cy="260" r="5" fill="#38BDF8" />
  <circle cx="396" cy="260" r="5" fill="#38BDF8" />
  <circle cx="544" cy="260" r="5" fill="#38BDF8" />
  <circle cx="692" cy="260" r="5" fill="#38BDF8" />
  <circle cx="840" cy="260" r="6" fill="#020617" stroke="#38BDF8" stroke-width="2" class="a-pulse" />

  <!-- Milestone Cards -->
  <!-- M1: Academic Foundation -->
  <rect x="30" y="290" width="140" height="95" rx="6" fill="#0F172A" stroke="#1E293B">
    <animate attributeName="stroke" values="#1E293B;#38BDF8;#1E293B" dur="6s" begin="0s" repeatCount="indefinite" />
  </rect>
  <text x="45" y="315" font-size="9" font-weight="700" fill="#38BDF8">Academic Foundation</text>
  <rect x="45" y="325" width="110" height="1" fill="#1E293B" />
  <text x="45" y="338" font-size="7" fill="#F8FAFC">Integrated Master of Computer</text>
  <text x="45" y="348" font-size="7" fill="#F8FAFC">Apps (Cyber Sec &amp; Forensics)</text>
  <text x="45" y="364" font-size="7" fill="#64748B">Category:</text>
  <text x="85" y="364" font-size="7" font-weight="600" fill="#94A3B8">Education</text>
  <text x="45" y="378" font-size="7" fill="#64748B">Status:</text>
  <text x="85" y="378" font-size="7" font-weight="600" fill="#38BDF8">In Progress</text>

  <!-- M2: Get2Gather -->
  <rect x="178" y="135" width="140" height="95" rx="6" fill="#0F172A" stroke="#1E293B">
    <animate attributeName="stroke" values="#1E293B;#38BDF8;#1E293B" dur="6s" begin="1.2s" repeatCount="indefinite" />
