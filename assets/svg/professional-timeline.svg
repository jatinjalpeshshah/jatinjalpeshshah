  <rect x="341" y="325" width="110" height="1" fill="#1E293B" />
  <text x="341" y="338" font-size="7" fill="#F8FAFC">AI-Based Solutions in</text>
  <text x="341" y="348" font-size="7" fill="#F8FAFC">Industry 4.0 Environments</text>
  <text x="341" y="364" font-size="7" fill="#64748B">Category:</text>
  <text x="381" y="364" font-size="7" font-weight="600" fill="#94A3B8">Academic Research</text>
  <text x="341" y="378" font-size="7" fill="#64748B">Status:</text>
  <text x="381" y="378" font-size="7" font-weight="600" fill="#10B981">Published</text>

  <!-- M4: PhishGuard -->
  <rect x="474" y="135" width="140" height="95" rx="6" fill="#0F172A" stroke="#1E293B">
    <animate attributeName="stroke" values="#1E293B;#38BDF8;#1E293B" dur="6s" begin="3.6s" repeatCount="indefinite" />
  </rect>
  <text x="489" y="160" font-size="9" font-weight="700" fill="#38BDF8">PhishGuard</text>
  <rect x="489" y="170" width="110" height="1" fill="#1E293B" />
  <text x="489" y="183" font-size="7" fill="#F8FAFC">Explainable AI Phishing Detection</text>
  <text x="489" y="193" font-size="7" fill="#F8FAFC">&amp; Threat Intelligence Platform</text>
  <text x="489" y="209" font-size="7" fill="#64748B">Category:</text>
  <text x="529" y="209" font-size="7" font-weight="600" fill="#94A3B8">AI Security Platform</text>
  <text x="489" y="223" font-size="7" fill="#64748B">Status:</text>
  <text x="529" y="223" font-size="7" font-weight="600" fill="#F59E0B">On Hold</text>

  <!-- M5: CyberSentinel AI -->
  <rect x="622" y="290" width="140" height="95" rx="6" fill="#0F172A" stroke="#1E293B">
    <animate attributeName="stroke" values="#1E293B;#38BDF8;#1E293B" dur="6s" begin="4.8s" repeatCount="indefinite" />
  </rect>
  <text x="637" y="315" font-size="9" font-weight="700" fill="#38BDF8">CyberSentinel AI</text>
  <rect x="637" y="325" width="110" height="1" fill="#1E293B" />
  <text x="637" y="338" font-size="7" fill="#F8FAFC">Enterprise Desktop SIEM / NDR</text>
  <text x="637" y="348" font-size="7" fill="#F8FAFC">&amp; Threat Intelligence</text>
  <text x="637" y="364" font-size="7" fill="#64748B">Category:</text>
  <text x="677" y="364" font-size="7" font-weight="600" fill="#94A3B8">Desktop Cybersec</text>
  <text x="637" y="378" font-size="7" fill="#64748B">Status:</text>
  <text x="677" y="378" font-size="7" font-weight="600" fill="#38BDF8">Ongoing</text>

  <!-- M6: Vanguard Portfolio -->
  <rect x="770" y="135" width="140" height="95" rx="6" fill="#0F172A" stroke="#1E293B">
    <animate attributeName="stroke" values="#1E293B;#38BDF8;#1E293B" dur="6s" begin="6s" repeatCount="indefinite" />
  </rect>
  <text x="785" y="160" font-size="9" font-weight="700" fill="#38BDF8">Vanguard Portfolio</text>
  <rect x="785" y="170" width="110" height="1" fill="#1E293B" />
  <text x="785" y="183" font-size="7" fill="#F8FAFC">Interactive portfolio built</text>
  <text x="785" y="193" font-size="7" fill="#F8FAFC">on the Vanguard OS System</text>
  <text x="785" y="209" font-size="7" fill="#64748B">Category:</text>
  <text x="825" y="209" font-size="7" font-weight="600" fill="#94A3B8">Engineering Portfolio</text>
  <text x="785" y="223" font-size="7" fill="#64748B">Status:</text>
  <text x="825" y="223" font-size="7" font-weight="600" fill="#38BDF8" class="a-pulse">Active</text>

  <!-- Achievement Dashboard -->
  <rect x="30" y="420" width="940" height="90" rx="6" fill="#0F172A" stroke="#1E293B" />
  <text x="45" y="440" font-size="8" font-weight="700" fill="#64748B" letter-spacing="1">ACHIEVEMENT DASHBOARD</text>

  <!-- M1: Major Projects -->
  <rect x="50" y="455" width="130" height="40" rx="4" fill="#020617" stroke="#1E293B" />
  <text x="115" y="470" font-size="7" font-weight="600" fill="#94A3B8" text-anchor="middle" letter-spacing="0.5">MAJOR PROJECTS</text>
  <text x="115" y="487" font-size="14" font-weight="700" fill="#38BDF8" text-anchor="middle">5</text>

  <!-- M2: Research Pubs -->
  <rect x="198" y="455" width="130" height="40" rx="4" fill="#020617" stroke="#1E293B" />
  <text x="263" y="470" font-size="7" font-weight="600" fill="#94A3B8" text-anchor="middle" letter-spacing="0.5">PUBLICATIONS</text>
  <text x="263" y="487" font-size="14" font-weight="700" fill="#38BDF8" text-anchor="middle">1</text>

  <!-- M3: Desktop Apps -->
  <rect x="346" y="455" width="130" height="40" rx="4" fill="#020617" stroke="#1E293B" />
  <text x="411" y="470" font-size="7" font-weight="600" fill="#94A3B8" text-anchor="middle" letter-spacing="0.5">DESKTOP APPS</text>
  <text x="411" y="487" font-size="14" font-weight="700" fill="#38BDF8" text-anchor="middle">1</text>

  <!-- M4: Cybersecurity Platforms -->
  <rect x="494" y="455" width="130" height="40" rx="4" fill="#020617" stroke="#1E293B" />
  <text x="559" y="470" font-size="7" font-weight="600" fill="#94A3B8" text-anchor="middle" letter-spacing="0.5">CYBERSEC PLATFORMS</text>
  <text x="559" y="487" font-size="14" font-weight="700" fill="#38BDF8" text-anchor="middle">2</text>

  <!-- M5: Full Stack Applications -->
  <rect x="642" y="455" width="130" height="40" rx="4" fill="#020617" stroke="#1E293B" />
  <text x="707" y="470" font-size="7" font-weight="600" fill="#94A3B8" text-anchor="middle" letter-spacing="0.5">FULL STACK APPS</text>
  <text x="707" y="487" font-size="14" font-weight="700" fill="#38BDF8" text-anchor="middle">2</text>

  <!-- M6: Research Focus -->
  <rect x="790" y="455" width="160" height="40" rx="4" fill="#020617" stroke="#1E293B" />
  <text x="870" y="470" font-size="7" font-weight="600" fill="#94A3B8" text-anchor="middle" letter-spacing="0.5">RESEARCH FOCUS</text>
  <text x="870" y="485" font-size="8" font-weight="700" fill="#10B981" text-anchor="middle">AI Security &amp; Cybersecurity</text>

