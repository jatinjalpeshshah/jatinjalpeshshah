<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 540" width="100%" height="100%">
  <defs>
    <pattern id="dot-grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="#334155" opacity="0.3"/>
    </pattern>
    <style>
      .font-sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
      .font-mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      .a-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
  </defs>

  <rect width="1000" height="540" fill="#020617"/>
  <rect width="1000" height="540" fill="url(#dot-grid)">
     <animate attributeName="x" values="0; -30" dur="20s" repeatCount="indefinite" />
  </rect>

  <g class="font-sans">
    <!-- Header -->
    <g transform="translate(30, 30)">
      <rect width="940" height="50" rx="6" fill="#0F172A" stroke="#1E293B" />
      <text x="25" y="30" font-size="14" font-weight="800" fill="#F8FAFC" letter-spacing="2">RESEARCH</text>
      <rect x="130" y="17" width="45" height="18" rx="9" fill="#1E293B" />
      <text x="152" y="29" font-size="9" font-weight="700" fill="#94A3B8" text-anchor="middle">v1.0</text>
      <circle cx="195" cy="26" r="4" fill="#10B981" class="a-pulse" />
      <text x="210" y="29" font-size="10" font-weight="700" fill="#10B981">PUBLISHED</text>
      <rect x="290" y="12" width="1" height="26" fill="#1E293B" />
      <text x="310" y="29" font-size="11" font-weight="500" fill="#64748B">AI Security Research</text>
    </g>

    <!-- Left Panel: Paper Details -->
    <g transform="translate(30, 110)">
      <rect width="300" height="220" rx="6" fill="#0F172A" stroke="#1E293B"/>
      <text x="20" y="30" font-size="10" fill="#94A3B8" font-weight="700" letter-spacing="1">RESEARCH PUBLICATION</text>
      
      <text x="20" y="65" font-size="13" fill="#F8FAFC" font-weight="700">Cybersecurity Challenges</text>
      <text x="20" y="85" font-size="13" fill="#F8FAFC" font-weight="700">and AI-Based Solutions</text>
      <text x="20" y="105" font-size="13" fill="#38BDF8" font-weight="700">in Industry 4.0 Environments</text>
      
      <rect x="20" y="130" width="260" height="1" fill="#1E293B" />
      
      <text x="20" y="155" font-size="10" fill="#64748B">STATUS</text>
      <text x="20" y="170" font-size="11" fill="#10B981" font-weight="600">PUBLISHED</text>

      <text x="140" y="155" font-size="10" fill="#64748B">JOURNAL</text>
      <text x="140" y="170" font-size="11" fill="#F8FAFC" font-weight="600">IJSRST</text>

      <text x="20" y="195" font-size="10" fill="#64748B">DOMAIN</text>
      <text x="20" y="210" font-size="11" fill="#F8FAFC" font-weight="600">ICS/SCADA Security</text>

      <text x="140" y="195" font-size="10" fill="#64748B">DATE</text>
      <text x="140" y="210" font-size="11" fill="#F8FAFC" font-weight="600">March 2026</text>
    </g>

    <!-- Middle Panel: Pipeline Graphic -->
    <g transform="translate(350, 110)">
      <rect width="300" height="220" rx="6" fill="#0F172A" stroke="#1E293B"/>
      <text x="20" y="30" font-size="10" fill="#94A3B8" font-weight="700" letter-spacing="1">RESEARCH LIFECYCLE</text>
      
      <g transform="translate(0, 0)">
         <!-- Static dashed track -->
         <path d="M 90 78 L 115 78 M 185 78 L 210 78 M 245 96 L 245 140 M 210 158 L 185 158 M 115 158 L 90 158" stroke="#1E293B" stroke-width="2" stroke-dasharray="2 2" fill="none"/>
         
         <!-- Active path highlighting overlays -->
         <!-- 1 to 2 -->
         <path d="M 90 78 L 115 78" stroke="#38BDF8" stroke-width="2" stroke-dasharray="2 2" fill="none" opacity="0">
           <animate attributeName="opacity" values="0;1;0;0;0;0" keyTimes="0;0.166;0.333;0.5;0.666;1" dur="6s" repeatCount="indefinite"/>
         </path>
         <!-- 2 to 3 -->
         <path d="M 185 78 L 210 78" stroke="#38BDF8" stroke-width="2" stroke-dasharray="2 2" fill="none" opacity="0">
           <animate attributeName="opacity" values="0;0;1;0;0;0" keyTimes="0;0.166;0.333;0.5;0.666;1" dur="6s" repeatCount="indefinite"/>
         </path>
         <!-- 3 to 4 -->
         <path d="M 245 96 L 245 140" stroke="#38BDF8" stroke-width="2" stroke-dasharray="2 2" fill="none" opacity="0">
           <animate attributeName="opacity" values="0;0;0;1;0;0" keyTimes="0;0.166;0.333;0.5;0.666;1" dur="6s" repeatCount="indefinite"/>
         </path>
         <!-- 4 to 5 -->
         <path d="M 210 158 L 185 158" stroke="#38BDF8" stroke-width="2" stroke-dasharray="2 2" fill="none" opacity="0">
           <animate attributeName="opacity" values="0;0;0;0;1;0" keyTimes="0;0.166;0.333;0.5;0.666;1" dur="6s" repeatCount="indefinite"/>
         </path>
         <!-- 5 to 6 -->
         <path d="M 115 158 L 90 158" stroke="#38BDF8" stroke-width="2" stroke-dasharray="2 2" fill="none" opacity="0">
           <animate attributeName="opacity" values="0;0;0;0;0;1" keyTimes="0;0.166;0.333;0.5;0.833;1" dur="6s" repeatCount="indefinite"/>
         </path>

         <!-- Nodes -->
         <g transform="translate(20, 60)">
           <rect width="70" height="36" rx="4" fill="#020617" stroke="#1E293B">
              <animate attributeName="stroke" values="#38BDF8;#1E293B;#1E293B;#1E293B;#1E293B;#1E293B" keyTimes="0;0.166;0.333;0.5;0.666;1" dur="6s" repeatCount="indefinite"/>
           </rect>
           <text x="35" y="21" font-size="9" fill="#F8FAFC" font-weight="600" text-anchor="middle">Problem</text>
         </g>
         <g transform="translate(115, 60)">
           <rect width="70" height="36" rx="4" fill="#020617" stroke="#1E293B">
              <animate attributeName="stroke" values="#1E293B;#38BDF8;#1E293B;#1E293B;#1E293B;#1E293B" keyTimes="0;0.166;0.333;0.5;0.666;1" dur="6s" repeatCount="indefinite"/>
           </rect>
           <text x="35" y="21" font-size="9" fill="#F8FAFC" font-weight="600" text-anchor="middle">Literature</text>
         </g>
         <g transform="translate(210, 60)">
           <rect width="70" height="36" rx="4" fill="#020617" stroke="#1E293B">
              <animate attributeName="stroke" values="#1E293B;#1E293B;#38BDF8;#1E293B;#1E293B;#1E293B" keyTimes="0;0.166;0.333;0.5;0.666;1" dur="6s" repeatCount="indefinite"/>
           </rect>
           <text x="35" y="21" font-size="9" fill="#F8FAFC" font-weight="600" text-anchor="middle">Analysis</text>
         </g>
         <g transform="translate(210, 140)">
           <rect width="70" height="36" rx="4" fill="#020617" stroke="#1E293B">
              <animate attributeName="stroke" values="#1E293B;#1E293B;#1E293B;#38BDF8;#1E293B;#1E293B" keyTimes="0;0.166;0.333;0.5;0.666;1" dur="6s" repeatCount="indefinite"/>
           </rect>
           <text x="35" y="21" font-size="9" fill="#F8FAFC" font-weight="600" text-anchor="middle">Solutions</text>
         </g>
         <g transform="translate(115, 140)">
           <rect width="70" height="36" rx="4" fill="#020617" stroke="#1E293B">
              <animate attributeName="stroke" values="#1E293B;#1E293B;#1E293B;#1E293B;#38BDF8;#1E293B" keyTimes="0;0.166;0.333;0.5;0.666;1" dur="6s" repeatCount="indefinite"/>
           </rect>
           <text x="35" y="21" font-size="9" fill="#F8FAFC" font-weight="600" text-anchor="middle">Findings</text>
         </g>
         <g transform="translate(20, 140)">
           <rect width="70" height="36" rx="4" fill="#020617" stroke="#10B981">
              <animate attributeName="stroke" values="#10B981;#10B981;#10B981;#10B981;#10B981;#38BDF8" keyTimes="0;0.166;0.333;0.5;0.833;1" dur="6s" repeatCount="indefinite"/>
           </rect>
           <text x="35" y="21" font-size="9" fill="#10B981" font-weight="600" text-anchor="middle">Publish</text>
         </g>
      </g>
    </g>

    <!-- Right Panel: Feature Highlights -->
    <g transform="translate(670, 110)">
      <!-- Feature 1: Industry 4.0 -->
      <g transform="translate(0, 0)">
         <rect width="145" height="105" rx="6" fill="#0F172A" stroke="#1E293B" />
         <rect x="15" y="15" width="20" height="20" rx="4" fill="rgba(56, 189, 248, 0.1)" stroke="#38BDF8"/>
         <circle cx="25" cy="25" r="3" fill="#38BDF8" />
         <text x="15" y="55" font-size="11" fill="#F8FAFC" font-weight="700">Industry 4.0</text>
         <text x="15" y="75" font-size="9" fill="#94A3B8">Security architectures</text>
         <text x="15" y="87" font-size="9" fill="#94A3B8">for smart systems</text>
      </g>
      <!-- Feature 2: Artificial Intelligence -->
      <g transform="translate(155, 0)">
         <rect width="145" height="105" rx="6" fill="#0F172A" stroke="#1E293B" />
         <rect x="15" y="15" width="20" height="20" rx="10" fill="rgba(139, 92, 246, 0.1)" stroke="#8B5CF6"/>
         <polygon points="25,20 28,27 22,27" fill="#8B5CF6" />
         <text x="15" y="55" font-size="11" fill="#F8FAFC" font-weight="700">AI Models</text>
         <text x="15" y="75" font-size="9" fill="#94A3B8">Machine learning for</text>
         <text x="15" y="87" font-size="9" fill="#94A3B8">anomaly detection</text>
      </g>
      <!-- Feature 3: Threat Detection -->
      <g transform="translate(0, 115)">
         <rect width="145" height="105" rx="6" fill="#0F172A" stroke="#1E293B" />
         <polygon points="25,15 35,35 15,35" fill="rgba(239, 68, 68, 0.1)" stroke="#EF4444" stroke-width="1.5"/>
         <circle cx="25" cy="27" r="2" fill="#EF4444" />
         <text x="15" y="55" font-size="11" fill="#F8FAFC" font-weight="700">Threat Detection</text>
         <text x="15" y="75" font-size="9" fill="#94A3B8">Real-time analysis of</text>
         <text x="15" y="87" font-size="9" fill="#94A3B8">malicious patterns</text>
      </g>
      <!-- Feature 4: Cyber Defense -->
      <g transform="translate(155, 115)">
         <rect width="145" height="105" rx="6" fill="#0F172A" stroke="#1E293B" />
         <rect x="15" y="15" width="20" height="20" transform="rotate(45, 25, 25)" fill="rgba(16, 185, 129, 0.1)" stroke="#10B981" stroke-width="1.5"/>
         <rect x="23" y="23" width="4" height="4" fill="#10B981" />
         <text x="15" y="55" font-size="11" fill="#F8FAFC" font-weight="700">Cyber Defense</text>
         <text x="15" y="75" font-size="9" fill="#94A3B8">Proactive mitigation</text>
         <text x="15" y="87" font-size="9" fill="#94A3B8">strategies &amp; frameworks</text>
      </g>
    </g>

    <!-- Metrics Strip -->
    <g transform="translate(30, 345)">
      <rect width="940" height="50" rx="6" fill="#0F172A" stroke="#1E293B" />
      <g transform="translate(30, 12)">
        <text x="0" y="10" font-size="10" fill="#94A3B8">Authors</text>
        <text x="0" y="26" font-size="14" fill="#F8FAFC" font-weight="700">4</text>
      </g>
      <rect x="235" y="10" width="1" height="30" fill="#1E293B" />
      <g transform="translate(265, 12)">
        <text x="0" y="10" font-size="10" fill="#94A3B8">Volume</text>
        <text x="0" y="26" font-size="14" fill="#F8FAFC" font-weight="700">13</text>
      </g>
      <rect x="470" y="10" width="1" height="30" fill="#1E293B" />
      <g transform="translate(500, 12)">
        <text x="0" y="10" font-size="10" fill="#94A3B8">Issue</text>
        <text x="0" y="26" font-size="14" fill="#10B981" font-weight="700">9</text>
      </g>
      <rect x="705" y="10" width="1" height="30" fill="#1E293B" />
      <g transform="translate(735, 12)">
        <text x="0" y="10" font-size="10" fill="#94A3B8">Pages</text>
        <text x="0" y="26" font-size="14" fill="#38BDF8" font-weight="700">11</text>
      </g>
    </g>

    <!-- Technologies -->
    <g transform="translate(30, 415)">
      <text x="0" y="15" font-size="10" font-weight="700" fill="#64748B" letter-spacing="1">RESEARCH STACK &amp; METHODOLOGY</text>
      
      <g transform="translate(0, 35)">
        <g transform="translate(0, 0)">
          <text x="0" y="0" font-size="10" font-weight="700" fill="#94A3B8">SECURITY DOMAINS</text>
          <text x="0" y="20" font-size="11" fill="#F8FAFC">ICS/SCADA</text>
          <text x="0" y="40" font-size="11" fill="#64748B">IoT Networks</text>
          <text x="0" y="60" font-size="11" fill="#64748B">Cyber-Physical</text>
        </g>
        <g transform="translate(195, 0)">
          <text x="0" y="0" font-size="10" font-weight="700" fill="#94A3B8">THREAT VECTORS</text>
          <text x="0" y="20" font-size="11" fill="#F8FAFC">Ransomware</text>
          <text x="0" y="40" font-size="11" fill="#64748B">DDoS Attacks</text>
          <text x="0" y="60" font-size="11" fill="#64748B">Data Breaches</text>
        </g>
        <g transform="translate(390, 0)">
          <text x="0" y="0" font-size="10" font-weight="700" fill="#94A3B8">AI DEFENSES</text>
          <text x="0" y="20" font-size="11" fill="#F8FAFC">Anomaly Detection</text>
          <text x="0" y="40" font-size="11" fill="#64748B">Threat Intelligence</text>
          <text x="0" y="60" font-size="11" fill="#64748B">Automated Response</text>
        </g>
        <g transform="translate(585, 0)">
          <text x="0" y="0" font-size="10" font-weight="700" fill="#94A3B8">INDUSTRY 4.0</text>
          <text x="0" y="20" font-size="11" fill="#F8FAFC">Smart Factories</text>
          <text x="0" y="40" font-size="11" fill="#64748B">Industrial IoT</text>
          <text x="0" y="60" font-size="11" fill="#64748B">Edge Computing</text>
        </g>
        <g transform="translate(780, 0)">
          <text x="0" y="0" font-size="10" font-weight="700" fill="#94A3B8">METHODOLOGY</text>
          <text x="0" y="20" font-size="11" fill="#F8FAFC">Literature Review</text>
          <text x="0" y="40" font-size="11" fill="#64748B">Threat Analysis</text>
          <text x="0" y="60" font-size="11" fill="#64748B">Conceptual Framework</text>
        </g>
      </g>
    </g>
  </g>
</svg>
